name: Keep Streamlit apps awake
on:
  schedule:
    - cron: '0 */8 * * *'   # every 8 hours
  workflow_dispatch:          # manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping apps
        run: |
          curl -sL -o /dev/null -w "%{http_code}" https://wingtra-lidar-explorer.streamlit.app/ || true
          curl -sL -o /dev/null -w "%{http_code}" https://wingtra-crop-health.streamlit.app/ || true
